<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="Alivio">
  <defs>
    <linearGradient id="dropG" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#9EC3A8"/>
      <stop offset="55%" stop-color="#7FB89E"/>
      <stop offset="100%" stop-color="#4A8168"/>
    </linearGradient>
    <radialGradient id="haloG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7FB89E" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#7FB89E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7FB89E" stop-opacity="0"/>
    </radialGradient>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,144,400;1,144,500&display=swap');
      .alivio-word { font-family: 'Fraunces', 'Newsreader', Georgia, serif; font-style: italic; font-weight: 400; font-size: 220px; fill: #2B443A; letter-spacing: -6px; dominant-baseline: central; }
    ]]></style>
  </defs>
  <rect width="1200" height="400" fill="#FAF8F4"/>
  <!-- halo -->
  <circle cx="220" cy="200" r="170" fill="url(#haloG)"/>
  <!-- gota -->
  <path d="M 220,60 C 140,150 112,215 112,250 C 112,295 158,330 220,330 C 282,330 328,295 328,250 C 328,215 300,150 220,60 Z" fill="url(#dropG)"/>
  <!-- texto -->
  <text x="400" y="210" class="alivio-word">Alivio</text>
</svg>
